name: Generate badges

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: tinemf/badge-dev-test@v1
        with:
          output-dir: generated

      - uses: actions/upload-pages-artifact@v3
        with:
          path: generated/

  deploy:
    needs: generate
    runs-on: ubuntu-latest
  
    permissions:
      pages: write
      id-token: write
  
    steps:
      - uses: actions/deploy-pages@v4
